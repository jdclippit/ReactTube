name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps

      - name: Patch for iOS (not tvOS)
        run: |
          cat > /tmp/patch.py << 'EOF'
          import json
          with open('app.json') as f:
              d = json.load(f)
          for p in d['expo']['plugins']:
              if isinstance(p, list) and len(p) > 1 and isinstance(p[1], dict):
                  if 'isTV' in p[1]:
                      p[1]['isTV'] = False
          with open('app.json', 'w') as f:
              json.dump(d, f, indent=2)
          EOF
          python3 /tmp/patch.py

      - run: npx expo prebuild --clean

      - name: Build
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme reacttube \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            -destination 'generic/platform=iOS' \
            build

      - name: Package IPA
        run: |
          APP=$(find build -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -rp "$APP" Payload/
          zip -r ReactTube.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ReactTube.ipa
