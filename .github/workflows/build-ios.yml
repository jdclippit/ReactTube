name: Build iOS IPA

on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - name: Patch app.json for iOS (not tvOS)
        run: |
          cat > /tmp/patch_tv.py << 'PYEOF'
import json
with open('app.json') as f:
    d = json.load(f)
for p in d['expo']['plugins']:
    if isinstance(p, list) and len(p) > 1 and isinstance(p[1], dict):
        if 'isTV' in p[1]:
            p[1]['isTV'] = False
with open('app.json', 'w') as f:
    json.dump(d, f, indent=2)
PYEOF
          python3 /tmp/patch_tv.py
          echo "Patched isTV -> false"
      - run: npx expo prebuild --clean
      - name: Detect workspace
        id: scheme
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "Detected workspace: $WORKSPACE"
      - name: Build IPA
        run: |
          SDK=iphoneos
          echo "${{ steps.scheme.outputs.workspace }}" | grep -q tvos && SDK=appletvos
          xcodebuild -workspace "${{ steps.scheme.outputs.workspace }}" \
            -scheme reacttube \
            -configuration Release \
            -sdk $SDK \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Package IPA
        run: |
          APP=$(find build -name "*.app" -type d | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -rp "$APP" Payload/
          zip -r ReactTube.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ReactTube.ipa
