name: Build iOS IPA

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npx expo prebuild --clean
      - name: Detect scheme
        id: scheme
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | awk '/Schemes:/{found=1;next} found{print $0; exit}' | xargs)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Detected scheme: $SCHEME"
      - name: Build IPA
        run: |
          SDK=iphoneos
          echo "${{ steps.scheme.outputs.workspace }}" | grep -q tvos && SDK=appletvos
          xcodebuild -workspace "${{ steps.scheme.outputs.workspace }}" \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -sdk $SDK \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Package IPA
        run: |
          APP=$(ls -d build/Build/Products/Release-*/*.app | head -1)
          mkdir -p Payload
          cp -rp "$APP" Payload/
          zip -r ReactTube.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ReactTube.ipa
